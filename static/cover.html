<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rubber Duck Diffision Platform Cover Scene</title>
    <link rel="stylesheet" href="/static/cover.css" />
  </head>
  <body>
    <canvas id="aurora-canvas" aria-hidden="true"></canvas>

    <main class="cover-stage" aria-label="Cover scene">
      <div id="duck-avatar" class="duck-avatar" data-level="6" aria-hidden="true">
        <div class="duck-shadow"></div>
        <div class="duck-body">
          <div class="duck-wing"></div>
          <div class="duck-head">
            <span class="duck-eye left"></span>
            <span class="duck-eye right"></span>
            <span class="duck-beak"></span>
          </div>
        </div>
      </div>
    </main>

    <script src="/static/cover.js" defer></script>
  </body>
</html>
